services:
  app:
    build: .
    env_file: apps/server/.env
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
